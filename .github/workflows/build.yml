name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build with Java 21
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn -B -DskipTests compile
